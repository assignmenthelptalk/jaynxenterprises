<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <title>Jaynx Enterprises</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Subtle top-highlight (polished metal feel) -->
  <rect width="32" height="16" rx="7" fill="url(#shine)"/>

  <!--
    Bold J letterform (path-based, no web fonts needed)
    Stem: x 14–22, y 5–22  (8 px wide)
    Hook: outer quad-bezier from (22,22) → (15,29) → (8,22)
           inner straight edge   (8,22)  → (14,22)
    Closes back to top: (14,5) → (22,5)
  -->
  <path
    fill="white"
    d="M22 5 L22 22 Q22 29 15 29 Q8 29 8 22 L14 22 L14 5 Z"
  />

  <!-- Orange bolt/pivot accent at left end of hook — industrial connector -->
  <circle cx="8" cy="22" r="2.8" fill="#f97316"/>
  <circle cx="8" cy="22" r="1.1" fill="#1e3a8a"/>
</svg>